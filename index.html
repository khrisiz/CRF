<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WLR Broadcast</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #000;
      color: #ff0000;
      font-family: 'Unbounded', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }
    header {
      letter-spacing: 0.15em;
      font-weight: 700;
      font-size: 1.5rem;
      text-align: center;
      padding: 0.75rem 0;
      border-bottom: 2px solid #ff0000;
      text-shadow: 0 0 5px #ff0000;
    }
    #videoWrapper {
      flex-grow: 1;
      position: relative;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.2) brightness(1.1) grayscale(20%);
      background: #111;
    }
    #localVideo {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      width: 30%;
      max-width: 160px;
      border: 2px solid #ff0000;
      border-radius: 0.375rem;
      opacity: 0.85;
      box-shadow: 0 0 15px #ff0000;
      filter: grayscale(40%);
    }
    #statusBar {
      background: #000;
      border-top: 2px solid #ff0000;
      color: #ff0000;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
    }
    #statusBar .d-flex > div {
      text-shadow: 0 0 4px #ff0000;
    }
    button {
      border-color: #ff0000;
      color: #ff0000;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background-color 0.3s, color 0.3s;
    }
    button:hover:not(:disabled) {
      background-color: #ff0000;
      color: #000;
      box-shadow: 0 0 10px #ff0000;
    }
    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

  <header>LIVE:</header>

  <div id="videoWrapper">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <div class="text-center my-2">
    <button id="skipBtn" class="btn btn-outline-danger" disabled>Skip</button>
  </div>

  <div id="statusBar" class="d-flex justify-content-between align-items-center">
    <div id="status">WAITING FOR SOMEONE TO TAP IN...</div>
    <div id="nsfwScore" class="fst-italic opacity-75">NSFW Score: N/A</div>
    <div id="queue" class="fst-italic opacity-75">Queue: 0</div>
  </div>

  <div class="text-center my-2">
    <input id="tipAmount" type="number" min="1" value="5" style="width:70px;" class="form-control d-inline-block" />
    <button id="tipBtn" class="btn btn-outline-warning" disabled>Send Tip</button>
  </div>

  <script src="client.js"></script>
</body>
</html>
