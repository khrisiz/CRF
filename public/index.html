<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WLR Broadcast</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #ff0000;
      font-family: 'Unbounded', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 1.2rem;
      font-size: 2rem;
      letter-spacing: 0.2em;
      background: #000;
      color: #ff0000;
      border-bottom: 2px solid #ff0000;
      text-shadow: 0 0 10px #ff0000;
    }

    #videoWrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      background: #000;
    }

    video#remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: contrast(1.2) brightness(1.1) grayscale(20%);
      background: #111;
    }

    video#localVideo {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 28%;
      border: 2px solid #ff0000;
      border-radius: 6px;
      opacity: 0.85;
      box-shadow: 0 0 25px #ff0000;
      filter: grayscale(40%);
    }

    #controls {
      background: #000;
      padding: 1rem;
      text-align: center;
    }

    button {
      background: transparent;
      border: 2px solid #ff0000;
      color: #ff0000;
      padding: 0.75rem 2rem;
      font-size: 1.2rem;
      border-radius: 4px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    button:hover {
      background: #ff0000;
      color: #000;
      box-shadow: 0 0 15px #ff0000;
    }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #statusBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      background: #000;
      font-size: 0.9rem;
      border-top: 2px solid #ff0000;
      color: #ff0000;
    }

    #status {
      font-weight: bold;
      text-shadow: 0 0 5px #ff0000;
    }

    #queue {
      font-style: italic;
      opacity: 0.6;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <header>LIVE: </header>

  <div id="videoWrapper">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <div id="controls">
    <button id="skipBtn" disabled>Skip</button>
  </div>

  <div id="statusBar">
    <div id="status">WAITING FOR SOMEONE TO TAP IN...</div>
    <div id="queue">Queue: 0</div>
  </div>

  <script>
    const socket = io();
    let localStream;
    let peerConnection;
    let currentRoom = null;

    const config = {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const skipBtn = document.getElementById('skipBtn');
    const statusText = document.getElementById('status');
    const queueText = document.getElementById('queue');

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        localStream = stream;
        localVideo.srcObject = stream;
        socket.emit('ready');
      })
      .catch(err => alert('Camera/mic error: ' + err));

    socket.on('connect', () => {
      console.log('Connected as:', socket.id);
    });

    socket.on('match', ({ room, initiator }) => {
      currentRoom = room;
      statusText.innerText = 'CONNECTED — STAY LIVE.';
      skipBtn.disabled = false;
      startPeerConnection(initiator);
    });

    socket.on('signal', async data => {
      if (!peerConnection) return;
      try {
        if (data.type === 'offer') {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          socket.emit('signal', { room: currentRoom, data: peerConnection.localDescription });
        } else if (data.type === 'answer') {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
        } else if (data.candidate) {
          await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
      } catch (e) {
        console.error('Signal error:', e);
      }
    });

    socket.on('queueStatus', ({ queueLength }) => {
      queueText.innerText = `Queue: ${queueLength}`;
    });

    socket.on('skip', () => {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      remoteVideo.srcObject = null;
      skipBtn.disabled = true;
      statusText.innerText = 'WAITING FOR SOMEONE TO TAP IN...';
    });

    function startPeerConnection(initiator) {
      peerConnection = new RTCPeerConnection(config);
      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          socket.emit('signal', { room: currentRoom, data: { candidate: event.candidate } });
        }
      };

      const remoteStream = new MediaStream();
      remoteVideo.srcObject = remoteStream;

      peerConnection.ontrack = event => {
        remoteStream.addTrack(event.track);
      };

      if (initiator) {
        peerConnection.createOffer()
          .then(offer => peerConnection.setLocalDescription(offer))
          .then(() => {
            socket.emit('signal', { room: currentRoom, data: peerConnection.localDescription });
          });
      }
    }

    skipBtn.addEventListener('click', () => {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      remoteVideo.srcObject = null;
      skipBtn.disabled = true;
      statusText.innerText = 'WAITING FOR A NEW MATCH...';
      socket.emit('skip', { room: currentRoom });
      currentRoom = null;
    });
  </script>
</body>
</html>
