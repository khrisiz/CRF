<!DOCTYPE html>
<html>
<head>
  <title>Video Pairing Debug</title>
  <style>
    video {
      width: 45%;
      margin: 5px;
      border: 1px solid black;
    }
    #controls {
      margin-top: 10px;
    }
  </style>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <h2>Video Chat</h2>
  <div id="status">Waiting for match...</div>
  <div id="controls">
    <button id="skipBtn" disabled>Skip Next</button>
  </div>
  <video id="localVideo" autoplay muted playsinline></video>
  <video id="remoteVideo" autoplay playsinline></video>

  <script>
    const socket = io();
    let localStream;
    let peerConnection;
    let currentRoom = null;

    const config = {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    };

    const localVideo = document.getElementById('localVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const skipBtn = document.getElementById('skipBtn');

    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
      .then(stream => {
        localStream = stream;
        localVideo.srcObject = stream;
        console.log('Got local media stream');
        socket.emit('ready');
      })
      .catch(err => alert('Error accessing camera/mic: ' + err));

    socket.on('connect', () => {
      console.log('Socket connected:', socket.id);
    });

    socket.on('match', ({ room, initiator }) => {
      console.log('Matched! Room:', room, 'Initiator:', initiator);
      currentRoom = room;
      document.getElementById('status').innerText = 'Matched! Room: ' + room;
      skipBtn.disabled = false;
      startPeerConnection(initiator);
    });

    socket.on('signal', async data => {
      console.log('Signal received:', data);
      if (!peerConnection) return;

      try {
        if (data.type === 'offer') {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          socket.emit('signal', { room: currentRoom, data: peerConnection.localDescription });
        } else if (data.type === 'answer') {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
        } else if (data.candidate) {
          await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
      } catch (e) {
        console.error('Error handling signal:', e);
      }
    });

    function startPeerConnection(initiator) {
      peerConnection = new RTCPeerConnection(config);

      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          socket.emit('signal', { room: currentRoom, data: { candidate: event.candidate } });
        }
      };

      const remoteStream = new MediaStream();
      remoteVideo.srcObject = remoteStream;

      peerConnection.ontrack = event => {
        remoteStream.addTrack(event.track);
      };

      if (initiator) {
        peerConnection.createOffer()
          .then(offer => peerConnection.setLocalDescription(offer))
          .then(() => {
            socket.emit('signal', { room: currentRoom, data: peerConnection.localDescription });
          });
      }
    }

    skipBtn.addEventListener('click', () => {
      console.log('Skip button clicked');

      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }

      remoteVideo.srcObject = null;
      skipBtn.disabled = true;
      document.getElementById('status').innerText = 'Waiting for new match...';

      socket.emit('skip', { room: currentRoom });
      currentRoom = null;
    });
  </script>
</body>
</html>
